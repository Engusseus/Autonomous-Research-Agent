  <main id="main">
    <header id="topbar">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu">
        <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <div id="breadcrumb" class="breadcrumb"></div>
      <div class="topbar-actions">
        <div id="connection-status" class="connection-indicator" title="API Status">
          <span class="status-dot"></span>
          <span class="status-text">CHECKING</span>
        </div>
        <div id="notification-bell-container"></div>
      </div>
    </header>
    <div id="content" class="content"></div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">SETTINGS</h2>
        <button class="modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">API BASE URL</label>
        <input id="api-url-input" type="url" class="input" placeholder="http://localhost:5000">
        <p class="field-hint">The base URL of the ARA API server</p>

        <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--c-border);">
        <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 14px; color: var(--c-text);">AUTHENTICATION</h3>

        <label class="field-label">EMAIL</label>
        <input id="auth-email-input" type="email" class="input" placeholder="user@example.com">

        <label class="field-label" style="margin-top: 1rem;">PASSWORD</label>
        <input id="auth-password-input" type="password" class="input" placeholder="Password">

        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
          <button id="auth-login-btn" class="btn btn-primary" type="button" style="flex: 1;">LOGIN</button>
          <button id="auth-logout-btn" class="btn btn-ghost" type="button" style="flex: 1;">LOGOUT</button>
        </div>
      </div>
      <div class="modal-footer">
        <button id="settings-save" class="btn btn-primary" type="button">SAVE</button>
        <button class="btn btn-ghost modal-close" type="button">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toasts" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
