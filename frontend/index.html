<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARA — Autonomous Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23E53935' width='100' height='100'/><text x='50' y='72' font-family='sans-serif' font-size='60' font-weight='900' fill='white' text-anchor='middle'>A</text></svg>">
</head>
<body>
  <aside id="sidebar" aria-label="Main navigation">
    <div class="sidebar-brand">
      <div class="brand-mark">ARA</div>
      <div class="brand-sub">AUTONOMOUS<br>RESEARCH AGENT</div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/" class="nav-link active" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
        DASHBOARD
      </a>
      <a href="#/papers" class="nav-link" data-route="papers">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
        PAPERS
      </a>
      <a href="#/jobs" class="nav-link" data-route="jobs">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
        JOBS
      </a>
      <a href="#/search" class="nav-link" data-route="search">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        SEARCH
      </a>
      <a href="#/import" class="nav-link" data-route="import">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        IMPORT
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="settings-btn" class="nav-link" type="button">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        SETTINGS
      </button>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu">
        <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <div id="breadcrumb" class="breadcrumb"></div>
      <div class="topbar-actions">
        <div id="connection-status" class="connection-indicator" title="API Status">
          <span class="status-dot"></span>
          <span class="status-text">CHECKING</span>
        </div>
      </div>
    </header>
    <div id="content" class="content"></div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">SETTINGS</h2>
        <button class="modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">API BASE URL</label>
        <input id="api-url-input" type="url" class="input" placeholder="http://localhost:5000">
        <p class="field-hint">The base URL of the ARA API server</p>
        <label class="field-label">AUTH TOKEN</label>
        <input id="api-token-input" type="password" class="input" placeholder="Bearer token (optional)">
        <p class="field-hint">JWT token for authenticated endpoints</p>
      </div>
      <div class="modal-footer">
        <button id="settings-save" class="btn btn-primary" type="button">SAVE</button>
        <button class="btn btn-ghost modal-close" type="button">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toasts" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
