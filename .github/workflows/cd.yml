name: CD

on:
  workflow_run:
    workflow: CI
    types: [completed]
    branches: [main]

jobs:
  deploy-to-registry:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push embedding service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/embedding-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/embedding-service:latest
            ghcr.io/${{ github.repository }}/embedding-service:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-to-registry
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy notification
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          echo "Images pushed to ghcr.io/${{ github.repository }}/api:${{ github.sha }}"

      - name: Pull latest images
        run: |
          docker pull ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository }}/embedding-service:${{ github.sha }}

      - name: Tag images for deployment
        run: |
          docker tag ghcr.io/${{ github.repository }}/api:${{ github.sha }} ara-api:latest
          docker tag ghcr.io/${{ github.repository }}/embedding-service:${{ github.sha }} ara-embedding-service:latest

      - name: Deploy to container host
        run: |
          echo "Stopping existing containers..."
          docker stop ara-api ara-embedding-service 2>/dev/null || true
          docker rm ara-api ara-embedding-service 2>/dev/null || true
          
          echo "Starting new containers..."
          docker run -d --name ara-api --restart unless-stopped -p 8080:8080 \
            -e ConnectionStrings__Postgres="${{ vars.PROD_POSTGRES_CONNECTION }}" \
            -e ConnectionStrings__Redis="${{ vars.PROD_REDIS_CONNECTION }}" \
            -e ASPNETCORE_ENVIRONMENT=Production \
            ara-api:latest
          
          docker run -d --name ara-embedding-service --restart unless-stopped -p 8001:8001 \
            ara-embedding-service:latest

      - name: Verify deployment
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/10)"
            sleep 3
          done
          echo "Health check failed"
          exit 1